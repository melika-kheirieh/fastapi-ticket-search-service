x-app-build: &app-build
  context: .
  args:
    PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    PIP_RETRIES: ${PIP_RETRIES:-10}
    PIP_TIMEOUT: ${PIP_TIMEOUT:-120}

x-app-environment: &app-environment
  APP_NAME: FastAPI Ticket Search Service
  ENVIRONMENT: local
  DATABASE_URL: postgresql+psycopg://ticket_user:ticket_password@postgres:5432/ticket_db
  ELASTICSEARCH_URL: http://elasticsearch:9200
  TICKET_SEARCH_INDEX: tickets_v1
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  OUTBOX_BATCH_SIZE: "20"
  OUTBOX_MAX_RETRY_COUNT: "3"
  OUTBOX_PROCESSING_TIMEOUT_SECONDS: "300"
  OUTBOX_BEAT_SCHEDULE_SECONDS: "10.0"

services:
  api:
    build: *app-build
    container_name: ticket_api
    ports:
      - "8001:8000"
    environment:
      <<: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build: *app-build
    container_name: ticket_worker
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=info"]
    environment:
      <<: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  beat:
    build: *app-build
    container_name: ticket_beat
    command: ["celery", "-A", "app.celery_app.celery_app", "beat", "--loglevel=info"]
    environment:
      <<: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  migrate:
    build: *app-build
    environment:
      DATABASE_URL: postgresql+psycopg://ticket_user:ticket_password@postgres:5432/ticket_db
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  postgres:
    image: postgres:16
    container_name: ticket_postgres
    environment:
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_password
      POSTGRES_DB: ticket_db
    ports:
      - "5432:5432"
    volumes:
      - ticket_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_user -d ticket_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ticket_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: ticket_elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ticket_elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null",
        ]
      interval: 10s
      timeout: 10s
      retries: 12

volumes:
  ticket_postgres_data:
  ticket_elasticsearch_data: