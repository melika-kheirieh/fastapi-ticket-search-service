services:
  api:
    build: .
    container_name: ticket_api
    ports:
      - "8001:8000"
    environment:
      APP_NAME: FastAPI Ticket Search Service
      ENVIRONMENT: local
      DATABASE_URL: postgresql+psycopg://ticket_user:ticket_password@postgres:5432/ticket_db
      ELASTICSEARCH_URL: http://elasticsearch:9200
      TICKET_SEARCH_INDEX: tickets_v1
    depends_on:
      migrate:
        condition: service_completed_successfully

  migrate:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://ticket_user:ticket_password@postgres:5432/ticket_db
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  postgres:
    image: postgres:16
    container_name: ticket_postgres
    environment:
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_password
      POSTGRES_DB: ticket_db
    ports:
      - "5432:5432"
    volumes:
      - ticket_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_user -d ticket_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: ticket_elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ticket_elasticsearch_data:/usr/share/elasticsearch/data

volumes:
  ticket_postgres_data:
  ticket_elasticsearch_data:
